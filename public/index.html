<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA DE COMANDO - OFICIAL</title>
    <style>
        body { margin: 0; background: #050505; color: #00ff00; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* Painel Principal */
        #interface {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: rgba(0, 20, 0, 0.9); padding: 20px; border: 2px solid #004400;
            width: 280px; box-shadow: 0 0 15px rgba(0,255,0,0.3);
        }

        /* Contador de Tiros */
      #contador-tiros {
            position: absolute;
            top: 20px;
            right: 30px;
            z-index: 100;
            color: #00ff00; /* Verde neon para o texto */
            font-family: 'Courier New', Courier, monospace;
            text-align: right;
            pointer-events: none; /* Garante que o clique passe através do número */
        }

        .numero-tiro {
            display: block;
            font-size: 4em; /* Aumentei o tamanho para dar destaque, já que não tem o box */
            font-weight: bold;
            color: #ffff00; /* Amarelo para o número */
            line-height: 1;
        }

        input { width: 80px; background: #001100; color: #00ff00; border: 1px solid #00ff00; padding: 8px; margin: 5px; font-size: 1.1em; }
        button { background: #660000; color: white; border: 1px solid #ff0000; padding: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }
        
        #log-telemetria, #resultado-impacto { 
            margin-top: 15px; padding-top: 10px; border-top: 1px dotted #00ff00; 
            font-size: 0.95em; line-height: 1.6; 
        }
        h3 { margin: 0 0 10px 0; color: #00ff00; text-align: center; border-bottom: 1px solid #00ff00; }

        #telemetria-vetorial {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        background: rgba(0, 20, 0, 0.6);
        padding: 5px 20px;
        border-bottom: 1px solid #004400;
        color: #00ff00;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.8em; /* Fonte pequena conforme solicitado */
        display: flex;
        gap: 20px;
        pointer-events: none;
        }
        .vetor-valor { color: #ffff00; font-weight: bold; }



    </style>
</head>
<body>

    <div id="contador-tiros">
        <span id="num-tiros" class="numero-tiro">0</span>
    </div>

    <div id="interface">
        <h3>SALA DE COMANDO</h3>
        <div style="margin-bottom: 10px; font-size: 0.8em;"><strong>V0: 802 m/s (FIXA)</strong></div>
        Elev. θ (°): <input type="number" id="angulo" value="30" step="0.1"><br>
        Azim. φ (°): <input type="number" id="azimute" value="0" step="0.1"><br>
        <button id="btn-disparar">Disparar</button>
        
        <div id="log-telemetria">RÁDIO EM ESPERA...</div>
        <div id="resultado-impacto"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        let trajetoriaAtual = null, projetilAtual = null, dadosUltimoImpacto = null;
        let alvoAtivo = true;
        let totalTiros = 0;

        // 1. SETUP DO AMBIENTE 3D
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 100, 300000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(-8000, 10000, -8000);
        camera.lookAt(35000, 0, 35000);

        const grid = new THREE.GridHelper(60000, 60, 0x003300, 0x001100);
        grid.position.set(30000, 0, 30000);
        scene.add(grid);

        // VETORES NA ORIGEM (X=Azul, Z=Vermelho conforme sua sugestão de cores)
        const origin = new THREE.Vector3(0, 0, 0);
        scene.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0), origin, 5000, 0x55aaff)); // X Azul
        scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1), origin, 5000, 0xff5555)); // Z Vermelho

        const alvo = new THREE.Mesh(
            new THREE.SphereGeometry(300),
            new THREE.MeshBasicMaterial({ color: 0xff0000 })
        );
        scene.add(alvo);

        // 2. LOGICA DE COMUNICAÇÃO
      socket.on('telemetria', (dados) => {

        // 1. Verificação de segurança: se o rádio receber algo, ele sai de "espera"
            if (!dados || !alvo) return;
             
             

            // Acessamos dados.telemetria porque você aninhou os dados no servidor
            const dParaTexto = dados.telemetria.distancia;
            const aParaTexto = dados.telemetria.azimute;

            document.getElementById('log-telemetria').innerHTML = 
                `🔭 DISTÂNCIA: ${(dParaTexto / 1000).toFixed(2)} Km<br>🧭 AZIMUTE: ${aParaTexto}°`;

            console.log("X real recebido:", dados.posicaoReal.x);

            if (dados.posicaoReal) {
                alvo.position.x = dados.posicaoReal.x;
                alvo.position.z = dados.posicaoReal.z;
                alvo.visible = true; // Garante que o ponto apareça
            }

            // Troca a mensagem de status se houver uma
            const statusRadio = document.getElementById('status-radio');
            if (statusRadio) statusRadio.innerText = "SINAL ESTÁVEL";
        });


        socket.on('relatorioImpacto', (res) => { dadosUltimoImpacto = res; });

      


        socket.on('animarTiro', (dados) => {
            if (trajetoriaAtual) scene.remove(trajetoriaAtual);
            if (projetilAtual) scene.remove(projetilAtual);
            
            document.getElementById('resultado-impacto').innerHTML = "🚀 PROJÉTIL EM VOO...";

            const pontos = dados.caminho;
            projetilAtual = new THREE.Mesh(
                new THREE.SphereGeometry(150),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            scene.add(projetilAtual);

            const geoLinha = new THREE.BufferGeometry();
            trajetoriaAtual = new THREE.Line(geoLinha, new THREE.LineBasicMaterial({ color: 0x00ff00 }));
            scene.add(trajetoriaAtual);

            let i = 0, rastro = [];
            const anim = setInterval(() => {
                if (i >= pontos.length) {
                    clearInterval(anim);
                    if (dadosUltimoImpacto) {
                        if (dadosUltimoImpacto.acerto === true || dadosUltimoImpacto.acerto === "true") {
                            document.getElementById('resultado-impacto').innerHTML = "<b style='color:red; font-size:1.2em;'>💥 ALVO DESTRUÍDO!</b>";
                            scene.remove(alvo);
                            alvoAtivo = false;
                            setTimeout(() => { alert("🎯 VITÓRIA! Navio inimigo neutralizado."); }, 300);
                        } else {
                            // RESULTADO COLORIDO E ESPAÇADO
                            document.getElementById('resultado-impacto').innerHTML = `
                                📍 IMPACTO:
                                <br> <span style="color: #55aaff;">X = ${dadosUltimoImpacto.x/1000} Km</span>   
                                <br> <span style="color: #ff5555;">Z = ${dadosUltimoImpacto.z/1000} Km</span> 
                                <br><br> ERRO:
                                <br> <span style="color: #55aaff;">ΔX = ${dadosUltimoImpacto.erroX/1000} Km</span>  
                                <br> <span style="color: #ff5555;">ΔZ = ${dadosUltimoImpacto.erroZ/1000} Km</span>`;
                        }
                    }
                    return;
                }
                const p = pontos[i];
                projetilAtual.position.set(p.x, p.y, p.z);
                // Atualiza os números inteiros na parte superior
                // Nota: p.vx, p.vy e p.vz devem vir do seu cálculo de trajetória no servidor
                if(p.vx !== undefined) {
                    document.getElementById('val-vx').innerText = Math.round(p.vx);
                    document.getElementById('val-vy').innerText = Math.round(p.vy);
                    document.getElementById('val-vz').innerText = Math.round(p.vz);
                }


                rastro.push(new THREE.Vector3(p.x, p.y, p.z));
                geoLinha.setFromPoints(rastro);
                
                i++;
            }, 300); // Velocidade de animação acelerada para fluidez em aula

            


        });

        document.getElementById('btn-disparar').onclick = () => {
            if (!alvoAtivo) { alert("Sem alvo no setor."); return; }
            
            totalTiros++;
            document.getElementById('num-tiros').innerText = totalTiros;
            document.getElementById('resultado-impacto').innerHTML = "";
            
            socket.emit('disparar', {
                equipe: 'ALFA',
                v0: 802,
                angulo: document.getElementById('angulo').value,
                azimute: document.getElementById('azimute').value
            });
        };

        function render() { requestAnimationFrame(render); renderer.render(scene, camera); }
        render();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>

    <div id="telemetria-vetorial">
        <span>Vx: <span id="val-vx" class="vetor-valor">0</span> m/s</span>
        <span>Vy: <span id="val-vy" class="vetor-valor">0</span> m/s</span>
        <span>Vz: <span id="val-vz" class="vetor-valor">0</span> m/s</span>
    </div>

</body>
</html>
